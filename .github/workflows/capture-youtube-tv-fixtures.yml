name: Capture YouTube TV Fixtures

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      home_url:
        description: Home or signed-in landing page URL
        required: true
        default: https://www.youtube.com/tv
      browse_url:
        description: Browse/list page URL to inspect
        required: true
        default: https://www.youtube.com/tv#/browse
      details_url:
        description: Details/watch page URL to inspect
        required: true
        default: https://www.youtube.com/tv#/watch?v=dQw4w9WgXcQ
      wait_ms:
        description: Extra milliseconds to wait after load for late network responses
        required: true
        default: '8000'

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    name: Capture signed-in YouTube TV fixtures
    runs-on: ubuntu-latest
    environment: fixture-capture
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: tools/youtube-tv-capture/package-lock.json

      - name: Install capture dependencies
        working-directory: tools/youtube-tv-capture
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tools/youtube-tv-capture
        run: npx playwright install --with-deps chromium

      - name: Decode YouTube TV session state
        shell: bash
        run: |
          test -n "$YOUTUBE_TV_STORAGE_STATE_BASE64"
          printf '%s' "$YOUTUBE_TV_STORAGE_STATE_BASE64" | base64 --decode > "$RUNNER_TEMP/youtube-tv.state.json"
          echo "STORAGE_STATE_PATH=$RUNNER_TEMP/youtube-tv.state.json" >> "$GITHUB_ENV"
        env:
          YOUTUBE_TV_STORAGE_STATE_BASE64: ${{ secrets.YOUTUBE_TV_STORAGE_STATE_BASE64 }}

      - name: Capture fixtures
        working-directory: tools/youtube-tv-capture
        env:
          STORAGE_STATE_PATH: ${{ env.STORAGE_STATE_PATH }}
          WAIT_MS: ${{ inputs.wait_ms || '8000' }}
          OUTPUT_DIR: ${{ github.workspace }}/tools/youtube-tv-capture/fixtures
          SKIP_SCREENSHOT: 'true'
          SKIP_HAR: 'true'
          CAPTURE_URLS_JSON: >-
            [
              {"name":"home","url":"${{ inputs.home_url || 'https://www.youtube.com/tv' }}"},
              {"name":"browse","url":"${{ inputs.browse_url || 'https://www.youtube.com/tv#/browse' }}"},
              {"name":"details","url":"${{ inputs.details_url || 'https://www.youtube.com/tv#/watch?v=dQw4w9WgXcQ' }}"}
            ]
        run: npm run capture

      - name: Analyze fixture changes
        id: analyze
        continue-on-error: true
        working-directory: tools/youtube-tv-capture
        run: node ./analyze.mjs > "$RUNNER_TEMP/pr-body.md"
        env:
          FIXTURES_DIR: ${{ github.workspace }}/tools/youtube-tv-capture/fixtures

      - name: Upload analysis report artifact
        if: steps.analyze.outcome == 'success'
        uses: actions/upload-artifact@v5
        with:
          name: youtube-tv-analysis-${{ github.run_number }}
          path: ${{ runner.temp }}/pr-body.md
          retention-days: 14

      - name: Create pull request with fixture changes
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add tools/youtube-tv-capture/fixtures/
          if git diff --cached --quiet; then
            echo "No fixture changes detected. Skipping pull request."
            exit 0
          fi

          BRANCH="fixtures/youtube-tv-$(date -u +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update YouTube TV fixtures $(date -u +%Y-%m-%d)"
          git push --force origin "$BRANCH"

          if [ -f "$RUNNER_TEMP/pr-body.md" ]; then
            PR_BODY=$(cat "$RUNNER_TEMP/pr-body.md")
          else
            PR_BODY="YouTube TV fixtures have changed. Review the HTML and script differences to update ad-filtering in \`app/src/main/res/raw/userscripts.js\`."
          fi

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --body "$PR_BODY"
            echo "Updated existing PR #$EXISTING_PR"
          else
            gh pr create \
              --title "chore: YouTube TV fixtures update $(date -u +%Y-%m-%d)" \
              --body "$PR_BODY" \
              --base "${{ github.ref_name }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

