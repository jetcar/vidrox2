name: Release Preparation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  detect_release_need:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      release_tag: ${{ steps.detect.outputs.release_tag }}
      tag_exists: ${{ steps.detect.outputs.tag_exists }}
      last_tag: ${{ steps.detect.outputs.last_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect version tag and commit delta
        id: detect
        shell: bash
        run: |
          release_tag="v$(sed -n 's/.*versionName = "\(.*\)".*/\1/p' app/build.gradle.kts | head -n1)"
          if [ -z "$release_tag" ]; then
            echo "Could not read versionName from app/build.gradle.kts"
            exit 1
          fi

          last_tag=$(git tag --list 'v*' --sort=-creatordate | head -n1)
          if [ -z "$last_tag" ]; then
            has_changes=true
          else
            commit_count=$(git rev-list --count "${last_tag}..HEAD")
            if [ "$commit_count" -gt 0 ]; then
              has_changes=true
            else
              has_changes=false
            fi
          fi

          if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
            tag_exists=true
          else
            tag_exists=false
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "last_tag=$last_tag" >> "$GITHUB_OUTPUT"
          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: detect_release_need
    if: needs.detect_release_need.outputs.has_changes == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  publish_release:
    needs:
      - detect_release_need
      - build
    if: needs.detect_release_need.outputs.has_changes == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download APK artifact
        uses: actions/download-artifact@v5
        with:
          name: app-debug-apk
          path: release-artifacts

      - name: Guard against duplicate version tag
        if: needs.detect_release_need.outputs.tag_exists == 'true'
        shell: bash
        run: |
          echo "Release tag ${{ needs.detect_release_need.outputs.release_tag }} already exists."
          echo "Increase versionName in app/build.gradle.kts before publishing a new release."
          exit 1

      - name: Publish GitHub release
        if: needs.detect_release_need.outputs.tag_exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect_release_need.outputs.release_tag }}
          name: ${{ needs.detect_release_need.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-artifacts/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
