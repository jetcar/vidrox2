name: Release Preparation

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - closed

jobs:
  check_scheduled_changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes in last 24 hours
        if: github.event_name == 'schedule'
        id: changes
        shell: bash
        run: |
          count=$(git rev-list --count --since='24 hours ago' HEAD)
          if [ "$count" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Default has_changes for non-scheduled events
        if: github.event_name != 'schedule'
        id: changes_default
        shell: bash
        run: echo "has_changes=true" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: check_scheduled_changes
    if: github.event_name != 'schedule' || needs.check_scheduled_changes.outputs.has_changes == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew --no-daemon assembleDebug

  update_release_draft:
    needs:
      - check_scheduled_changes
      - build
    if: github.event_name != 'schedule' || needs.check_scheduled_changes.outputs.has_changes == 'true'
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
